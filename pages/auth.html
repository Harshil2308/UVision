<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication | UVision</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="auth">
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">UVision</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#authNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="authNav">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="auth.html">Login / Signup</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="dashboard-shell">
    <div class="container">
      <div class="page-header text-center">
        <span class="section-kicker">Authentication</span>
        <h1 class="mt-3">Access your personalized sunlight dashboard</h1>
        <p class="section-copy mx-auto" style="max-width: 760px;">This page now connects to the backend API when it is running locally. Use the seeded demo users or create a new account.</p>
      </div>

      <div class="row g-4 justify-content-center">
        <div class="col-lg-5">
          <div class="form-card h-100">
            <h4>Login</h4>
            <form class="row g-3 mt-1" id="loginForm">
              <div class="col-12">
                <label class="form-label">Email</label>
                <input id="loginEmail" type="email" class="form-control" placeholder="name@example.com">
              </div>
              <div class="col-12">
                <label class="form-label">Password</label>
                <input id="loginPassword" type="password" class="form-control" placeholder="Enter password">
              </div>
              <div class="col-12 d-grid">
                <button class="btn btn-sky rounded-pill" type="submit">Login</button>
              </div>
            </form>
            <div id="loginMessage" class="alert d-none mt-3 mb-0"></div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="form-card h-100">
            <h4>Sign Up</h4>
            <form class="row g-3 mt-1" id="signupForm">
              <div class="col-md-6"><label class="form-label">Full Name</label><input id="signupName" type="text" class="form-control" placeholder="Your name"></div>
              <div class="col-md-6"><label class="form-label">Email</label><input id="signupEmail" type="email" class="form-control" placeholder="name@example.com"></div>
              <div class="col-md-4"><label class="form-label">Age</label><input id="signupAge" type="number" class="form-control" placeholder="24"></div>
              <div class="col-md-4"><label class="form-label">Gender</label><select id="signupGender" class="form-select"><option>Male</option><option>Female</option><option>Other</option></select></div>
              <div class="col-md-4"><label class="form-label">Skin Type</label><select id="signupSkinType" class="form-select"><option>Sensitive</option><option>Combination</option><option>Normal</option><option>Oily</option><option>Dry</option></select></div>
              <div class="col-md-6"><label class="form-label">Lifestyle</label><select id="signupLifestyle" class="form-select"><option>Indoor</option><option>Outdoor</option></select></div>
              <div class="col-md-6"><label class="form-label">Password</label><input id="signupPassword" type="password" class="form-control" placeholder="Create password"></div>
              <div class="col-12 d-grid">
                <button class="btn btn-sun rounded-pill" type="submit">Create Account</button>
              </div>
            </form>
            <div id="signupMessage" class="alert d-none mt-3 mb-0"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
